<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>退館QR読み取り</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f7f7f7;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        #reader {
            width: 300px;
            margin: auto;
        }
    </style>
</head>

<body>
    <h1>退館QR読み取り</h1>

    <div id="reader"></div>

    <script>
        function onScanSuccess(decodedText) {
            console.log("QR:", decodedText);
            window.location.href = "/checkout/" + decodedText;
        }

        const html5QrCode = new Html5Qrcode("reader");

        Html5Qrcode.getCameras().then(cameras => {
    　　　　 if (cameras && cameras.length) {
                html5QrCode.start(
                    cameras[0].id,
                    {
                        fps: 10,
                        qrbox: 250,
                        videoConstraints: {
                            facingMode: "environment",
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                   },
                   onScanSuccess
               ).catch(err => {
                   console.error("カメラ起動エラー:", err);
                   alert("カメラを起動できませんでした: " + err);
               });
           } else {
               alert("カメラが検出されませんでした。");
           }
       }).catch(err => {
           console.error("カメラ取得エラー:", err);
           alert("カメラ取得に失敗しました: " + err);
       });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>退館QR読み取り</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f7f7f7;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        #reader {
            width: 300px;
            margin: auto;
        }
    </style>
</head>

<body>
    <h1>退館QR読み取り</h1>

    <!-- カメラ映像の表示領域（正しい位置） -->
    <div id="reader" style="width: 100%; max-width: 600px; margin: auto; border: 2px solid #ccc;"></div>

    <!-- QR読み取り結果の表示領域（追加） -->
    <div id="result" style="margin-top: 20px; font-size: 20px; color: #333;"></div>

    <div id="status" style="margin-top: 10px; font-size: 18px; color: #555;"></div>

    <script>
        function onScanSuccess(decodedText) {
            console.log("QR:", decodedText);

            // 画面に読み取ったテキストを即表示
            document.getElementById("result").innerText = "読み取り: " + decodedText;

            // 非同期で退館処理を送信（高速）
            fetch("/checkout/" + decodedText, { method: "POST" })
                .then(response => response.json())
                .then(data => {
                    document.getElementById("status").innerText = "退館処理: " + data.status;
                })
                .catch(err => {
                    document.getElementById("status").innerText = "退館エラー: " + err;
                });
          }


        const html5QrCode = new Html5Qrcode("reader");

    setTimeout(() => {
        Html5Qrcode.getCameras().then(cameras => {
    　　　　 if (cameras && cameras.length) {
                html5QrCode.start(
                    cameras[0].id,
                    {
                        fps: 10,
                        qrbox: 250,
                        videoConstraints: {
                            facingMode: "environment",
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                   },
                   onScanSuccess
               ).catch(err => {
                   console.error("カメラ起動エラー:", err);
                   alert("カメラを起動できませんでした: " + err);
               });
           } else {
               alert("カメラが検出されませんでした。");
           }
       }).catch(err => {
           console.error("カメラ取得エラー:", err);
           alert("カメラ取得に失敗しました: " + err);
       });
   }, 500); // ← 0.5秒待機 
        
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>退館QR読み取り</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f7f7f7;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        #reader {
            width: 300px;
            margin: auto;
        }
    </style>
</head>

<body>
    <h1>退館QR読み取り</h1>

    <div id="reader"></div>

    <script>
        function onScanSuccess(decodedText) {
            console.log("QR:", decodedText);
            window.location.href = "/checkout/" + decodedText;
        }

        const html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            cameras[0].id,
            {
                fps: 10,
                qrbox: 250,

                // ★ 高解像度指定（読み取り速度UP）
                videoConstraints: {
                      width: { ideal: 1920 },
                      height: { ideal: 1080 },
                      facingMode: "environment"
                }
           },
           onScanSuccess
        );

            }
        });
    </script>
</body>
</html>

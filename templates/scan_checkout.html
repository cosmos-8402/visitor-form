<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>退館QR読み取り</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f7f7f7;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        #reader {
            width: 300px;
            margin: auto;
        }
    </style>
</head>

<body>
    <h1>退館QR読み取り</h1>

    <!-- カメラ映像の表示領域（正しい位置） -->
    <div id="reader" style="width: 100%; max-width: 600px; margin: auto; border: 2px solid #ccc;"></div>

    <!-- QR読み取り結果の表示領域（追加） -->
    <div id="result" style="margin-top: 20px; font-size: 20px; color: #333;"></div>

    <div id="status" style="margin-top: 10px; font-size: 18px; color: #555;"></div>

<script>
function onScanSuccess(decodedText) {
    console.log("QR:", decodedText);

// スマホ側のQR表示画面に visitor_id を渡す
window.location.href = "/visitor_qr/" + decodedText;
}

window.addEventListener("DOMContentLoaded", async () => {
    const html5QrCode = new Html5Qrcode("reader");

    try {
        const cameras = await Html5Qrcode.getCameras();
        if (cameras.length === 0) {
            alert("カメラが見つかりません");
            return;
        }

        // 最初に検出されたカメラを使用
        const cameraId = cameras[0].id;
        console.log("使用カメラ:", cameras[0].label);

        setTimeout(() => {
            html5QrCode.start(
                cameraId,
                {
                    fps: 20,
                    qrbox: 300,
                    videoConstraints: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                },
                onScanSuccess
            ).catch(err => {
                alert("カメラ起動エラー: " + err);
            });
        }, 2000);
    } catch (err) {
        alert("初期化エラー: " + err);
        console.error(err);
    }
});



</script>


</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>退館QR読み取り</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f7f7f7;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        #reader {
            width: 300px;
            margin: auto;
        }
    </style>
</head>

<body>
    <h1>退館QR読み取り</h1>

    <!-- カメラ映像の表示領域（正しい位置） -->
    <div id="reader" style="width: 100%; max-width: 600px; margin: auto; border: 2px solid #ccc;"></div>

    <!-- QR読み取り結果の表示領域（追加） -->
    <div id="result" style="margin-top: 20px; font-size: 20px; color: #333;"></div>

    <div id="status" style="margin-top: 10px; font-size: 18px; color: #555;"></div>

<script>
function onScanSuccess(decodedText) {
    console.log("QR:", decodedText);
    document.getElementById("result").innerText = "読み取り: " + decodedText;

    fetch("/checkout/" + decodedText, { method: "POST" })
        .then(response => response.json())
        .then(data => {
            document.getElementById("status").innerText = "退館処理: " + data.status;
        })
        .catch(err => {
            document.getElementById("status").innerText = "退館エラー: " + err;
        });
}

window.addEventListener("DOMContentLoaded", async () => {
    const html5QrCode = new Html5Qrcode("reader");

    try {
        const cameras = await Html5Qrcode.getCameras();
        if (cameras.length === 0) {
            alert("カメラが見つかりません");
            return;
        }

        const cameraId = "277aa00009196eae2d8cf67a099b12539a71667ae06d39ea64d906200d08e2f2";

        // 2秒待機して安定化
        setTimeout(() => {
            html5QrCode.start(
                cameraId,
                {
                    fps: 10,
                    qrbox: 250,
                    videoConstraints: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                },
                onScanSuccess
            ).catch(err => {
                alert("カメラ起動エラー: " + err);
            });
        }, 2000);

    } catch (err) {
        alert("初期化エラー: " + err);
        console.error(err);
    }
});


</script>


</body>
</html>

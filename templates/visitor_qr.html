<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>来訪者QRコード</title>

    <style>
        /* QRコードをスマホで最大サイズで表示する */
        .qr-container svg {
            width: 100vw !important;     /* 画面幅いっぱい */
            max-width: 500px !important; /* 最大サイズ */
            height: auto !important;
            display: block;
            margin: 20px auto;
        }

        /* visitor_id の文字を大きく */
        .visitor-id {
            font-size: 28px;
            margin-top: 20px;
        }
    </style>
</head>

<body style="text-align:center; margin-top:30px;">

    <div class="qr-container">
        {{ qr_svg|safe }}
    </div>

    <p class="visitor-id">
        ID: {{ visitor_id }}
    </p>

</body>
</html>

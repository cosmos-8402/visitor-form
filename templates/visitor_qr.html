<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>本人ID QRコード</title>

    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            padding: 20px;
        }
        .qr-image {
            width: 90vw;
            max-width: 600px;
            height: auto;
            image-rendering: pixelated;
        }
        .visitor-id {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>本人ID QRコード</h1>

    <!-- QR画像（入館時も退館時も表示OK） -->
    <img src="data:image/png;base64,{{ qr_png }}" class="qr-image">

    <!-- ★入館時の本人ID表示（JinjaでOK） -->
    <div class="visitor-id">ID: {{ visitor_id }}</div>

    <!-- ★退館ID表示領域（JSで書き換える） -->
    <div id="scan-result" style="margin-top:20px; font-size:20px; font-weight:bold;"></div>

<script>
    const parts = window.location.pathname.split("/");
    const visitorId = parts[parts.length - 1];

    // ★退館IDを表示する関数（これが無いと絶対に表示されない）
    function showCheckoutIdIfDone() {
        const params = new URLSearchParams(window.location.search);
        const checkoutFlag = params.get("checkout");

        if (checkoutFlag === "done") {
            document.getElementById("scan-result").innerText = "退館ID: " + visitorId;
        }
    }

    // ★PC側はURLに checkout=done が付いているので即表示
    showCheckoutIdIfDone();

    // ★スマホ側はURLが変わらないので10秒ごとに退館状態を確認
    setInterval(() => {
        fetch(`/api/check_status/${visitorId}`)
            .then(res => res.json())
            .then(data => {
                if (data.checkout === true) {
                    if (!window.location.search.includes("checkout=done")) {
                        window.location.href = window.location.pathname + "?checkout=done";
                    }
                }
            })
            .catch(err => console.error("check_status error:", err));
    }, 5000);
</script>


</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>本人ID QRコード</title>

    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            padding: 20px;
        }
        .qr-image {
            width: 100vw;
            max-width: 700px; /* ← 読み取り速度UPのため拡大 */
            height: auto;
            margin-top: 20px;
        }
        .visitor-id {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>本人ID QRコード</h1>

    <img src="data:image/png;base64,{{ qr_png }}" class="qr-image">

    <div class="visitor-id">ID: {{ visitor_id }}</div>
</body>
</html>

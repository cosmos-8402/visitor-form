<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>本人ID QRコード</title>

    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            padding: 20px;
        }
        .qr-image {
            width: 90vw; /* 画面幅の90%で表示（ほぼ全画面） */
            max-width: 600px; /* PCでも大きく表示 */
            height: auto;
            image-rendering: pixelated; /* ← ぼやけ防止（超重要） */
        }
        .visitor-id {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>本人ID QRコード</h1>

    <img src="data:image/png;base64,{{ qr_png }}" class="qr-image">

    <div class="visitor-id">ID: {{ visitor_id }}</div>

<div id="scan-result" style="margin-top:20px; font-size:20px; font-weight:bold;"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const checkoutFlag = params.get("checkout");

    if (checkoutFlag === "done") {
        const parts = window.location.pathname.split("/");
        const visitorId = parts[parts.length - 1];
        document.getElementById("scan-result").innerText = "退館ID: " + visitorId;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>来訪者QRコード</title>

    <style>
        /* QRコードをスマホで大きく表示する */
        .qr-container svg {
            width: 80vw;        /* 画面幅の80% → スマホで大きく表示 */
            max-width: 350px;   /* 最大サイズ */
            height: auto;
            display: block;
            margin: 20px auto;
        }

        /* visitor_id の文字を大きく */
        .visitor-id {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body style="text-align:center; margin-top:30px;">

    <!-- ★ここが「HTML側をこうする」の意味 -->
    <div class="qr-container">
        {{ qr_svg|safe }}
    </div>

    <p class="visitor-id">
        ID: {{ visitor_id }}
    </p>

</body>
</html>
